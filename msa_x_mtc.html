
<!-- What I Want on the Marketing Game:
    Title Screen w/ MSA X MTC Presents
    Next Screen w/ only Play Button
    Click Play = Hallway png & pov: you are a new member in the lb muslim community w/text background goes away after up arrow key
    Up arrow key = goes closer to door w/text saying you hear noise coming from behind this door, would u like to approach the door, up arrow key
    Up arrow key = 2 options now: read flyer (1 key) & open door (2 key)
    1 key: flyer will read MSA X MTC Collab for "Event Name", option 2 to enter
    2 key: Black screen for 5 seconds and says welcome to our muslim community -->




<html lang = "en">
<head>
    <title>MSA X MTC Presents</title>
    <style>
        /* Reset */
        * {margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #000;
            color: #fff;
            font-family: serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* All Screens Hidden by Default */
        .screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 20px;
            width: 100%;
            height: 100vh;
            text-align: center;
            padding: 24px;
        }
        
        /* Allows screen to be shown to users */
        .screen.active {display: flex; }

        /* Game Canvas */
        #game-canvas {
            width: 100%;
            max-width: 680px;
            height: auto;
            display: block;
        }

        /* Black Screen Mechanics */
        #blackout {
            position: fixed;
            inset: 0;
            background: #000;
            opacity: 0;
            pointer-events: None;
            z-index: 50;
            transition: opacity 0.15s;
        }

        /* Overlay */
        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0,92);
            display: None;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 40;
       }

       /* Allows overlay to be shown to users */
       .overlay.show {display: flex; }

       /* Button Mechanics */
       button {
            padding: 12px 32px:
            background: transparent;
            border: 1px solid #523801;
            color: #523801;
            font-size: 14px;
            cursor: pointer; 
       }

       /* Button Display */
       button:hover {background: rgba(255,255,255,0.1)}

       </style>
    </head>

</body>
    <div id = "blackout"></div>
    <div id = "overlay">
        <p id="overlay-content">Overlay content goes here</p>
    <button onclick="hideOverlay()">Close</button>
  </div>

  <!-- SCREEN 1: TITLE -->
  <div id="screen-title" class="screen active">
    <h1>MSA X MTC Presents</h1>
    <p>A New Muslim Organization On Campus</p>
    <button onclick="goTo('screen-play')">Continue</button>
  </div>

  <!-- SCREEN 2: PLAY -->
  <div id="screen-play" class="screen">
    <h1>The Muslim Tech Collaborative</h1>
    <button onclick="goTo('screen-game')">PLAY</button>
  </div>

  <!-- SCREEN 3: GAME -->
  <div id="screen-game" class="screen">
    <canvas id="game-canvas" width="680" height="510"></canvas>
    <h1>How It Feels to Pull Up to a Muslim Tech Event</h1>
    <p id="narration">Your POV:</p>
    <div id="options" style="display:none;">
      <button onclick="handleOption(1)">Option 1</button>
      <button onclick="handleOption(2)">Option 2</button>
    </div>
  </div>

<script>

  // ── STATE ──
  const state = {
    step: 0,
    locked: false
  }

  // ── SCREEN SWITCHING ──
  function goTo(screenId) {
    // hide all screens
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'))
    // show the one we want
    document.getElementById(screenId).classList.add('active')
  }

  // ── BLACK FLASH ──
  function flash(durationMs, callback) {
    const el = document.getElementById('blackout')
    el.style.opacity = '1'
    setTimeout(() => {
      if (callback) callback()
      setTimeout(() => { el.style.opacity = '0' }, 80)
    }, durationMs)
  }

  // ── OVERLAY ──
  function showOverlay(content) {
    document.getElementById('overlay-content').textContent = content
    document.getElementById('overlay').classList.add('show')
  }

  function hideOverlay() {
    document.getElementById('overlay').classList.remove('show')
  }

  // ── CANVAS IMAGE ──
  const canvas = document.getElementById('game-canvas')
  const ctx = canvas.getContext('2d')
  const img = new Image()

  function drawImage(scale) {
    const W = canvas.width, H = canvas.height
    const ox = (W - W * scale) / 2
    const oy = (H - H * scale) / 2
    ctx.clearRect(0, 0, W, H)
    ctx.drawImage(img, ox, oy, W * scale, H * scale)
  }

  img.onload = () => drawImage(1.0)
  img.src = 'hallway.png' // swap with your file name

  // ── NARRATION ──
  function setNarration(text) {
    document.getElementById('narration').textContent = text
  }

  // ── OPTIONS ──
  function showOptions() {
    document.getElementById('options').style.display = 'flex'
  }

  function hideOptions() {
    document.getElementById('options').style.display = 'none'
  }

  function handleOption(key) {
    if (key === 1) {
      showOverlay('Key 1: Read flyer')
    }
    if (key === 2) {
      flash(5000, () => {
        showOverlay('Key 2: Welcome to our Muslim Tech Collaborative')
      })
    }
  }

  // ── STEP LOGIC ──
  function stepForward() {
    if (state.locked) return

    if (state.step === 0) {
      state.locked = true
      flash(500, () => {
        drawImage(1.25)
        setNarration('Muslim Community Spotted! You approach the door.')
        state.step = 1
        state.locked = false
      })
    }

    else if (state.step === 1) {
      state.locked = true
      flash(500, () => {
        drawImage(1.55)
        setNarration('There is a flyer!')
        showOptions()
        state.step = 2
        state.locked = false
      })
    }
  }

  // ── KEYBOARD ──
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowUp') stepForward()
    if (e.key === '1')       handleOption(1)
    if (e.key === '2')       handleOption(2)
  })

</script>
</body>
</html>
